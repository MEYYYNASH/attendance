<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report - SETEC Attendance System</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js CDN for Interactive Visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <!-- SETEC SVG Logo - Crafted matching the real crest -->
                <svg class="setec-logo" viewBox="0 0 200 250" width="80" height="100">
                    <defs>
                        <clipPath id="clip-left">
                            <rect x="0" y="0" width="100" height="300" />
                        </clipPath>
                    </defs>
                    
                    <!-- Shield Base -->
                    <!-- Left Side (Solid Green) -->
                    <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="#00a859" />
                    
                    <!-- Right Side (White Overlay) -->
                    <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="#ffffff" clip-path="url(#clip-left)" />
                    
                    <!-- Shield Border Outline -->
                    <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="none" stroke="#00a859" stroke-width="8" />
                    
                    <!-- Inner overlapping text/letters representation -->
                    <!-- S in White on Green (left) -->
                    <text x="65" y="115" font-family="'Outfit', sans-serif" font-size="75" font-weight="900" fill="#ffffff">S</text>
                    <!-- E in Green on White (right) -->
                    <text x="105" y="115" font-family="'Outfit', sans-serif" font-size="75" font-weight="900" fill="#00a859">E</text>
                    
                    <!-- Middle Gold Ribbon/Banner representation -->
                    <path d="M 20 150 Q 100 170 180 150 L 175 185 Q 100 200 25 185 Z" fill="#fcd116" />
                    <!-- Ribbon text -->
                    <text x="100" y="176" font-family="'Outfit', sans-serif" font-size="14" font-weight="800" fill="#111520" text-anchor="middle" letter-spacing="1">SETEC</text>
                </svg>
                <div class="brand-text">
                    <h1>SETEC</h1>
                    <p>Institute</p>
                </div>
            </div>
            
            <nav class="sidebar-menu">
                <a href="Dashboard.html" class="nav-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a href="Students.html" class="nav-item">
                    <i class="fa-solid fa-user-group"></i>
                    <span>Students</span>
                </a>
                <a href="MarkAttendance.html" class="nav-item">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Mark Attendance</span>
                </a>
                <a href="MonthlyReport.html" class="nav-item active">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Monthly Report</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-switch-container">
                    <i class="fa-solid fa-moon"></i>
                    <span>Dark Theme</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-left">
                    <h2 class="page-title" id="page-title">Monthly Report</h2>
                </div>
                <div class="navbar-right">
                </div>
            </header>

            <!-- Monthly Report View -->
            <section id="view-reports" class="content-view active-view">
                <div class="report-controls glass-card">
                    <div class="report-params">
                        <div class="param-item">
                            <label for="report-month-select">Month:</label>
                            <input type="month" id="report-month-select" class="glass-month-input">
                        </div>
                        <div class="param-item">
                            <label for="report-class-select">Group:</label>
                            <select id="report-class-select" class="glass-select">
                                <option value="all">All Groups</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="btn-refresh-report">
                            <i class="fa-solid fa-arrows-rotate"></i>
                            <span>Reload</span>
                        </button>
                    </div>
                </div>

                <div class="glass-card">
                    <!-- Print Layout Header Metadata (hidden by default CSS, shown during @media print) -->
                    <div class="report-header-printable">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <svg viewBox="0 0 200 250" width="60" height="75" style="fill: #000;">
                                <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="none" stroke="#000" stroke-width="8"/>
                                <text x="65" y="115" font-family="sans-serif" font-size="75" font-weight="bold" fill="#000">S</text>
                                <text x="105" y="115" font-family="sans-serif" font-size="75" font-weight="bold" fill="#000">E</text>
                            </svg>
                            <div>
                                <h2 style="font-size: 20px; font-weight: 800; text-transform: uppercase;">SETEC Institute</h2>
                                <h3 style="font-size: 14px; color: #555;">Student Attendance Monthly Ledger</h3>
                                <p style="font-size: 11px; margin-top: 4px; color: #666;">Group: <strong id="print-class-name">All Groups</strong> | Month: <strong id="print-month-name">July 2026</strong></p>
                            </div>
                        </div>
                        <div style="text-align: right; font-size: 11px; color: #666;">
                            <p>Generated: 15-Jul-2026</p>
                            <p>System: SETEC AMS v2.0</p>
                        </div>
                    </div>

                    <div class="table-responsive table-scroll-x">
                        <table class="data-table report-grid-table" id="table-monthly-report">
                            <thead>
                                <!-- Loaded dynamically -->
                            </thead>
                            <tbody>
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <div class="report-legend">
                        <span class="legend-item"><span class="lg-box lg-p">P</span> Present</span>
                        <span class="legend-item"><span class="lg-box lg-a">A</span> Absent</span>
                        <span class="legend-item"><span class="lg-box lg-l">L</span> Late</span>
                        <span class="legend-item"><span class="lg-box lg-e">E</span> Excused</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Mac OS Bottom Dock Navigation Menu (Mobile Only) -->
    <div class="mac-dock-container">
        <div class="mac-dock">
            <a href="Dashboard.html" class="dock-item" id="dock-nav-dashboard" data-view="dashboard" title="Dashboard">
                <i class="fa-solid fa-house"></i>
                <span class="dock-dot"></span>
            </a>
            <a href="Students.html" class="dock-item" id="dock-nav-students" data-view="students" title="Students">
                <i class="fa-solid fa-user-group"></i>
                <span class="dock-dot"></span>
            </a>
            <a href="MarkAttendance.html" class="dock-item" id="dock-nav-attendance" data-view="attendance" title="Attendance">
                <i class="fa-solid fa-calendar-check"></i>
                <span class="dock-dot"></span>
            </a>
            <a href="MonthlyReport.html" class="dock-item active" id="dock-nav-reports" data-view="reports" title="Reports">
                <i class="fa-solid fa-chart-line"></i>
                <span class="dock-dot"></span>
            </a>
        </div>
    </div>

    <!-- Confirmation Toast / Popup Alert Notification -->
    <div id="toast-notification" class="toast">
        <div class="toast-content">
            <i class="fa-solid fa-circle-check toast-icon"></i>
            <span class="toast-message" id="toast-message">Action successful!</span>
        </div>
    </div>

    <!-- Script File -->
    <script src="script.js?v=2.1"></script>
</body>
</html>
