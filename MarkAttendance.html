<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - SETEC Attendance System</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js CDN for Interactive Visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <!-- SETEC SVG Logo - Crafted matching the real crest -->
                <svg class="setec-logo" viewBox="0 0 200 250" width="80" height="100">
                    <defs>
                        <clipPath id="clip-left">
                            <rect x="0" y="0" width="100" height="300" />
                        </clipPath>
                    </defs>
                    
                    <!-- Shield Base -->
                    <!-- Left Side (Solid Green) -->
                    <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="#00a859" />
                    
                    <!-- Right Side (White Overlay) -->
                    <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="#ffffff" clip-path="url(#clip-left)" />
                    
                    <!-- Shield Border Outline -->
                    <path d="M 10 10 Q 10 100 100 220 Q 190 100 190 10 Z" fill="none" stroke="#00a859" stroke-width="8" />
                    
                    <!-- Inner overlapping text/letters representation -->
                    <!-- S in White on Green (left) -->
                    <text x="65" y="115" font-family="'Outfit', sans-serif" font-size="75" font-weight="900" fill="#ffffff">S</text>
                    <!-- E in Green on White (right) -->
                    <text x="105" y="115" font-family="'Outfit', sans-serif" font-size="75" font-weight="900" fill="#00a859">E</text>
                    
                    <!-- Middle Gold Ribbon/Banner representation -->
                    <path d="M 20 150 Q 100 170 180 150 L 175 185 Q 100 200 25 185 Z" fill="#fcd116" />
                    <!-- Ribbon text -->
                    <text x="100" y="176" font-family="'Outfit', sans-serif" font-size="14" font-weight="800" fill="#111520" text-anchor="middle" letter-spacing="1">SETEC</text>
                </svg>
                <div class="brand-text">
                    <h1>SETEC</h1>
                    <p>Institute</p>
                </div>
            </div>
            
            <nav class="sidebar-menu">
                <a href="Dashboard.html" class="nav-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a href="Students.html" class="nav-item">
                    <i class="fa-solid fa-user-group"></i>
                    <span>Students</span>
                </a>
                <a href="MarkAttendance.html" class="nav-item active">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Mark Attendance</span>
                </a>
                <a href="MonthlyReport.html" class="nav-item">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Monthly Report</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-switch-container">
                    <i class="fa-solid fa-moon"></i>
                    <span>Dark Theme</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-left">
                    <h2 class="page-title" id="page-title">Mark Attendance</h2>
                </div>
                <div class="navbar-right">
                </div>
            </header>

            <!-- Live Attendance Marker View -->
            <section id="view-attendance" class="content-view active-view">
                <!-- Parameters Controls -->
                <div class="table-controls glass-card">
                    <div class="attendance-header-controls">
                        <div class="param-item">
                            <label for="attendance-date">Date:</label>
                            <input type="date" id="attendance-date" class="glass-date-input">
                        </div>
                        <div class="param-item">
                            <label for="attendance-class-select">Group:</label>
                            <select id="attendance-class-select" class="glass-select">
                                <option value="SW40">SW40</option>
                            </select>
                        </div>
                    </div>
                    <div class="attendance-header-controls" style="margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; width: 100%;">
                        <div class="quick-mark-actions">
                            <button class="btn btn-success-outline" id="btn-mark-all-present">
                                <i class="fa-solid fa-circle-check"></i> All Present
                            </button>
                            <button class="btn btn-danger-outline" id="btn-mark-all-absent">
                                <i class="fa-solid fa-circle-xmark"></i> All Absent
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Live Attendance Mark Grid -->
                <div class="glass-card">
                    <div class="marker-search-bar">
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="marker-search-input" placeholder="Quick filter by student name or ID...">
                        </div>
                        <div class="attendance-summary-banner">
                            <span class="summary-item">Present: <strong class="text-green" id="mark-summary-present">0</strong></span>
                            <span class="summary-item">Absent: <strong class="text-red" id="mark-summary-absent">0</strong></span>
                            <span class="summary-item">Late: <strong class="text-yellow" id="mark-summary-late">0</strong></span>
                            <span class="summary-item">Excused: <strong class="text-blue" id="mark-summary-excused">0</strong></span>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="table-attendance-marker">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Full Name</th>
                                    <th>Group</th>
                                    <th>Gender</th>
                                    <th class="text-center">Attendance Status</th>
                                    <th>Notes / Remarks</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <div class="attendance-footer-actions">
                        <button class="btn btn-primary btn-lg" id="btn-save-attendance">
                            <i class="fa-solid fa-floppy-disk"></i> Save Attendance Records
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Mac OS Bottom Dock Navigation Menu (Mobile Only) -->
    <div class="mac-dock-container">
        <div class="mac-dock">
            <a href="Dashboard.html" class="dock-item" id="dock-nav-dashboard" data-view="dashboard" title="Dashboard">
                <i class="fa-solid fa-house"></i>
                <span class="dock-dot"></span>
            </a>
            <a href="Students.html" class="dock-item" id="dock-nav-students" data-view="students" title="Students">
                <i class="fa-solid fa-user-group"></i>
                <span class="dock-dot"></span>
            </a>
            <a href="MarkAttendance.html" class="dock-item active" id="dock-nav-attendance" data-view="attendance" title="Attendance">
                <i class="fa-solid fa-calendar-check"></i>
                <span class="dock-dot"></span>
            </a>
            <a href="MonthlyReport.html" class="dock-item" id="dock-nav-reports" data-view="reports" title="Reports">
                <i class="fa-solid fa-chart-line"></i>
                <span class="dock-dot"></span>
            </a>
        </div>
    </div>

    <!-- Confirmation Toast / Popup Alert Notification -->
    <div id="toast-notification" class="toast">
        <div class="toast-content">
            <i class="fa-solid fa-circle-check toast-icon"></i>
            <span class="toast-message" id="toast-message">Action successful!</span>
        </div>
    </div>

    <!-- Script File -->
    <script src="script.js?v=2.1"></script>
</body>
</html>
